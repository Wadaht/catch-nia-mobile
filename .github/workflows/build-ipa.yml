name: Build unsigned IPA

# Builds an unsigned .ipa on a macOS runner so you can sideload it via
# Sideloadly / AltStore. Sideloadly will re-sign it with your Apple ID,
# so we don't need any code-signing certificates here.
#
# Trigger:
#   - Manually from the Actions tab ("Run workflow")
#   - Automatically on every push to main
#
# Output:
#   - The IPA appears as a downloadable artifact at the bottom of the
#     workflow run page (CatchNia-unsigned.ipa).

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Generate app icon from source image
        run: |
          # Source is 200x200 JPG. Use sips to:
          #  1. Convert JPG → PNG
          #  2. Upscale to 1024x1024 (Apple's required source size)
          #  3. Flatten any alpha (iOS app icons cannot have transparency)
          mkdir -p resources-generated
          SRC="resources/icon-source.jpg"
          OUT="resources-generated/icon.png"
          sips -s format png "$SRC" --out "$OUT"
          sips -z 1024 1024 "$OUT"
          # Strip alpha by re-encoding through sips with white background
          sips -s format png -s formatOptions normal "$OUT" --out "$OUT"

          # Place into the iOS asset catalog at every required size
          ICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICONSET"
          # Copy generated PNGs at each size required by Contents.json
          for size in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $size $size "$OUT" --out "$ICONSET/AppIcon-$size.png"
          done
          # Some Contents.json files reference @2x/@3x — write a fresh Contents.json
          cat > "$ICONSET/Contents.json" <<'EOF'
          {
            "images" : [
              { "size" : "20x20", "idiom" : "iphone", "filename" : "AppIcon-40.png", "scale" : "2x" },
              { "size" : "20x20", "idiom" : "iphone", "filename" : "AppIcon-60.png", "scale" : "3x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "AppIcon-58.png", "scale" : "2x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "AppIcon-87.png", "scale" : "3x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "AppIcon-80.png", "scale" : "2x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "AppIcon-120.png", "scale" : "3x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "AppIcon-120.png", "scale" : "2x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "AppIcon-180.png", "scale" : "3x" },
              { "size" : "20x20", "idiom" : "ipad", "filename" : "AppIcon-20.png", "scale" : "1x" },
              { "size" : "20x20", "idiom" : "ipad", "filename" : "AppIcon-40.png", "scale" : "2x" },
              { "size" : "29x29", "idiom" : "ipad", "filename" : "AppIcon-29.png", "scale" : "1x" },
              { "size" : "29x29", "idiom" : "ipad", "filename" : "AppIcon-58.png", "scale" : "2x" },
              { "size" : "40x40", "idiom" : "ipad", "filename" : "AppIcon-40.png", "scale" : "1x" },
              { "size" : "40x40", "idiom" : "ipad", "filename" : "AppIcon-80.png", "scale" : "2x" },
              { "size" : "76x76", "idiom" : "ipad", "filename" : "AppIcon-76.png", "scale" : "1x" },
              { "size" : "76x76", "idiom" : "ipad", "filename" : "AppIcon-152.png", "scale" : "2x" },
              { "size" : "83.5x83.5", "idiom" : "ipad", "filename" : "AppIcon-167.png", "scale" : "2x" },
              { "size" : "1024x1024", "idiom" : "ios-marketing", "filename" : "AppIcon-1024.png", "scale" : "1x" }
            ],
            "info" : { "version" : 1, "author" : "xcode" }
          }
          EOF
          ls -la "$ICONSET"

      - name: Patch Info.plist for landscape
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :UIRequiresFullScreen true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIStatusBarHidden bool true" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :UIStatusBarHidden true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIViewControllerBasedStatusBarAppearance bool false" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :UIViewControllerBasedStatusBarAppearance false" "$PLIST"
          # Replace orientation arrays with landscape-only
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationLandscapeLeft" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:1 string UIInterfaceOrientationLandscapeRight" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationLandscapeLeft" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:1 string UIInterfaceOrientationLandscapeRight" "$PLIST"
          echo "--- Patched Info.plist ---"
          cat "$PLIST"

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build unsigned .app
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Package as unsigned IPA
        run: |
          cd ios/App
          APP_PATH="build/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App.app not found at $APP_PATH"
            find build -name "*.app" -type d
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr CatchNia-unsigned.ipa Payload
          rm -rf Payload
          ls -la CatchNia-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatchNia-unsigned-ipa
          path: ios/App/CatchNia-unsigned.ipa
          retention-days: 30

      - name: Show download instructions
        run: |
          echo ""
          echo "================================================"
          echo "  Build complete!"
          echo "================================================"
          echo "  Download the artifact 'CatchNia-unsigned-ipa'"
          echo "  from this workflow run page, then drag the"
          echo "  .ipa into Sideloadly and sign with your"
          echo "  Apple ID to install on your iPhone."
          echo "================================================"
